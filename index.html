<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GivingGauge — P&amp;M Apparel</title>
<style>
  :root{
    --bg:#f2f4f3;
    --card:#ffffff;
    --ink:#0f1b17;
    --ink-2:#334;
    --muted:#8a9490;
    --line:#e7eae9;
    --green:#3f8a5c;
    --green-soft:#e8f2ec;
    --gold:#d5a029;
    --gold-soft:#faf1de;
    --red:#c0392b;
    --red-soft:#fdf1f0;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
    padding-bottom:60px;
  }
  .wrap{max-width:1100px;margin:0 auto;padding:0 20px}

  /* ---------- masthead ---------- */
  .masthead{
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 0 18px;gap:16px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:11px}
  .brand .mark{width:34px;height:34px;flex:0 0 34px}
  .brand h1{font-size:15px;font-weight:800;letter-spacing:-.01em}
  .brand .sub{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;font-weight:600}

  .queue-meta{font-size:12.5px;color:var(--muted)}
  .queue-meta b{color:var(--ink);font-weight:700}

  /* ---------- filters ---------- */
  .filters{display:flex;gap:7px;flex-wrap:wrap;padding-bottom:16px}
  .filt{
    background:var(--card);border:1px solid var(--line);border-radius:99px;
    padding:7px 14px;font-size:12.5px;font-weight:600;color:var(--ink-2);
    cursor:pointer;font-family:inherit;transition:.12s;
  }
  .filt:hover{border-color:#d3d9d7}
  .filt[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:#fff}
  .filt:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .filt .n{opacity:.55;margin-left:5px;font-weight:600}

  /* ---------- queue ---------- */
  .queue{display:flex;flex-direction:column;gap:10px}
  .req{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 18px;display:grid;
    grid-template-columns:82px 1fr auto;gap:18px;align-items:center;
    cursor:pointer;text-align:left;width:100%;font-family:inherit;
    transition:.12s;
  }
  .req:hover{border-color:#d3d9d7;transform:translateY(-1px)}
  .req:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .req .dial{width:82px;display:block}
  .req h3{font-size:15.5px;font-weight:800;letter-spacing:-.01em;margin-bottom:3px}
  .req .line{font-size:12.5px;color:var(--muted);line-height:1.45}
  .req .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .tag{
    font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    padding:3px 8px;border-radius:99px;background:#f4f6f5;color:var(--ink-2);
  }
  .tag.red{background:var(--red-soft);color:var(--red)}
  .tag.gold{background:var(--gold-soft);color:#8a6414}
  .tag.green{background:var(--green-soft);color:var(--green)}

  .verdict{
    font-size:11.5px;font-weight:700;padding:7px 13px;border-radius:99px;
    white-space:nowrap;letter-spacing:.02em;
  }
  .verdict.green{background:var(--green-soft);color:var(--green)}
  .verdict.gold{background:var(--gold-soft);color:#8a6414}
  .verdict.red{background:var(--red-soft);color:var(--red)}

  .status-dot{
    display:inline-block;width:6px;height:6px;border-radius:99px;
    background:var(--gold);margin-right:6px;vertical-align:middle;
  }
  .status-dot.done{background:var(--green)}
  .status-dot.declined{background:var(--red)}

  .empty{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:44px 24px;text-align:center;
  }
  .empty h3{font-size:15px;font-weight:800;margin-bottom:5px}
  .empty p{font-size:13px;color:var(--muted)}

  /* ---------- detail panel ---------- */
  .scrim{
    position:fixed;inset:0;background:rgba(15,27,23,.34);
    opacity:0;pointer-events:none;transition:opacity .18s;z-index:40;
  }
  .scrim.open{opacity:1;pointer-events:auto}
  .panel{
    position:fixed;top:0;right:0;bottom:0;width:min(560px,100%);
    background:var(--bg);z-index:50;overflow-y:auto;
    transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);
    box-shadow:-14px 0 40px rgba(15,27,23,.13);
  }
  .panel.open{transform:none}
  .panel-in{padding:18px 22px 40px}

  .panel-top{
    display:flex;align-items:flex-start;justify-content:space-between;
    gap:14px;padding-bottom:14px;
  }
  .panel-top h2{font-size:20px;font-weight:800;letter-spacing:-.02em;line-height:1.25}
  .panel-top .sub{font-size:12.5px;color:var(--muted);margin-top:3px}
  .x{
    background:var(--card);border:1px solid var(--line);border-radius:9px;
    width:32px;height:32px;flex:0 0 32px;cursor:pointer;font-size:16px;
    color:var(--muted);font-family:inherit;line-height:1;
  }
  .x:hover{color:var(--ink)}
  .x:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

  .card{
    background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);padding:18px;margin-bottom:11px;
  }
  .card.hero{display:flex;align-items:center;gap:16px;padding:16px 18px}
  .card.hero .dial{flex:0 0 132px}
  .card.hero .read{flex:1 1 auto;min-width:0}
  .card.hero .read .rec{
    font-size:16px;font-weight:800;letter-spacing:-.01em;line-height:1.3;margin-bottom:5px;
  }
  .card.hero .read p{font-size:12.5px;color:var(--muted);line-height:1.5}

  .label{
    font-size:10.5px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;
    color:var(--muted);margin-bottom:11px;
  }
  .label.red{color:var(--red)}
  .label.green{color:var(--green)}

  .facts li{
    list-style:none;display:flex;gap:11px;font-size:13px;color:var(--ink-2);
    padding:7px 0;border-bottom:1px solid var(--line);line-height:1.45;
  }
  .facts li:last-child{border-bottom:none;padding-bottom:0}
  .facts b{
    flex:0 0 96px;color:var(--muted);font-weight:600;font-size:10.5px;
    letter-spacing:.06em;text-transform:uppercase;padding-top:2px;
  }
  .facts .flag{color:var(--red);font-weight:600}

  /* scorecard */
  .dim{padding:9px 0;border-bottom:1px solid var(--line)}
  .dim:last-child{border-bottom:none;padding-bottom:0}
  .dim .r1{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .dim .nm{font-size:13.5px;font-weight:700}
  .dim .pt{font-size:13px;font-weight:800;white-space:nowrap}
  .dim .pt em{font-style:normal;color:var(--muted);font-weight:600;font-size:11.5px}
  .dim .why{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
  .dim .meter{height:4px;background:var(--line);border-radius:99px;margin-top:7px;overflow:hidden}
  .dim .meter i{display:block;height:100%;border-radius:99px;background:var(--ink);opacity:.75}

  .totals{
    display:flex;align-items:baseline;justify-content:space-between;
    padding-top:12px;margin-top:6px;border-top:1.5px solid var(--ink);
  }
  .totals .k{font-size:12.5px;font-weight:700}
  .totals .v{font-size:17px;font-weight:800}
  .mod{display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink-2);padding:9px 0 0}
  .mod b{font-weight:700}

  /* flags */
  .flag-item{padding:9px 0;border-bottom:1px solid var(--line)}
  .flag-item:last-child{border-bottom:none;padding-bottom:0}
  .flag-item .ft{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
  .flag-item .fd{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
  .sev{width:7px;height:7px;border-radius:99px;flex:0 0 7px}
  .sev.red{background:var(--red)}
  .sev.amber{background:var(--gold)}
  .sev.green{background:var(--green)}

  .dq{background:var(--red-soft);border-color:#f6dedb}
  .dq .ft{color:var(--red)}
  .dq .fd{color:#7d3a33}
  .dq .flag-item{border-bottom-color:#f6dedb}

  /* decision */
  .decide{position:sticky;bottom:0;background:var(--bg);padding:12px 0 0;margin-top:4px}
  .btns{display:flex;gap:8px}
  .btn{
    flex:1 1 0;padding:12px 10px;border-radius:11px;border:1px solid var(--line);
    background:var(--card);font-family:inherit;font-size:13px;font-weight:700;
    color:var(--ink-2);cursor:pointer;transition:.12s;
  }
  .btn:hover{border-color:#c9d1ce}
  .btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .btn.go{background:var(--green);border-color:var(--green);color:#fff}
  .btn.go:hover{background:#357a4e}
  .btn.no{background:var(--card);border-color:#e6cdc9;color:var(--red)}
  .btn.no:hover{background:var(--red-soft)}

  .logged{
    background:var(--card);border:1px solid var(--line);border-radius:11px;
    padding:12px 14px;font-size:12.5px;color:var(--ink-2);line-height:1.5;
  }
  .logged b{font-weight:700}
  .logged .ov{color:var(--gold);font-weight:700}
  .undo{
    background:none;border:none;color:var(--muted);font-family:inherit;
    font-size:12px;font-weight:600;cursor:pointer;text-decoration:underline;
    padding:0;margin-top:6px;
  }
  .undo:hover{color:var(--ink)}

  @media (max-width:720px){
    .req{grid-template-columns:64px 1fr;gap:13px}
    .req .dial{width:64px}
    .req .verdict{grid-column:2;justify-self:start;margin-top:4px}
    .card.hero{flex-direction:column;align-items:stretch;text-align:center}
    .card.hero .dial{flex:none;margin:0 auto}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important}
  }
</style>
</head>
<body>

</div>
